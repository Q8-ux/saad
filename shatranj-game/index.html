<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>شطرنج النخبة</title>
  <style>
    :root{--bg:#0b1220;--panel:#111a2d;--line:#263551;--gold:#d6ad60;--text:#f6f2e8;--muted:#a8b2c5;--danger:#ef6b73;--ok:#5fd39b}
    *{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:linear-gradient(135deg,#070c16,#111b31);color:var(--text);min-height:100vh}
    .wrap{width:min(1120px,94%);margin:auto;padding:28px 0}.brand{text-align:center;margin-bottom:22px}.brand h1{margin:0;color:var(--gold);font-size:clamp(28px,5vw,48px)}.brand p{color:var(--muted)}
    .panel{background:rgba(17,26,45,.96);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:0 20px 60px #0006}.hidden{display:none!important}
    .grid{display:grid;gap:18px}.auth-grid{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}.game-grid{grid-template-columns:minmax(300px,620px) minmax(270px,1fr);align-items:start}
    input,button{width:100%;border-radius:12px;border:1px solid var(--line);padding:13px 14px;font-size:16px}input{background:#0b1324;color:#fff;margin:6px 0 12px}button{background:var(--gold);color:#17120a;font-weight:700;cursor:pointer;margin-top:8px}button.secondary{background:#1a2944;color:#fff}button.danger{background:var(--danger);color:#fff}button:disabled{opacity:.65;cursor:wait}.row{display:flex;gap:10px}.row>*{flex:1}
    .status{margin:12px 0;padding:10px 12px;border-radius:10px;background:#0a1324;color:var(--muted);min-height:42px}.ok{color:var(--ok)}.bad{color:var(--danger)}
    .topbar{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:18px}.user{color:var(--gold)}
    .board{display:grid;grid-template-columns:repeat(8,1fr);aspect-ratio:1;border:8px solid #382b1c;border-radius:12px;overflow:hidden;direction:ltr}.sq{display:grid;place-items:center;font-size:clamp(28px,6vw,58px);user-select:none;cursor:pointer}.light{background:#ead7b0}.dark{background:#8d5f3c}.sq.sel{outline:5px solid #f3c552;outline-offset:-5px}.sq.last{box-shadow:inset 0 0 0 5px #5fd39b99}
    .room-code{font-size:34px;letter-spacing:6px;color:var(--gold);font-weight:800;text-align:center;background:#0a1324;padding:12px;border-radius:14px}.players{display:grid;gap:8px;margin:14px 0}.player{padding:11px;border:1px solid var(--line);border-radius:10px;background:#0b1324}.small{font-size:13px;color:var(--muted)}
    @media(max-width:820px){.game-grid{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}.topbar button{width:auto}}
  </style>
</head>
<body>
<div class="wrap">
  <header class="brand"><h1>♛ شطرنج النخبة</h1><p>غرف خاصة، لعب مباشر، وحفظ النقلات عبر Supabase</p></header>

  <section id="authView" class="panel grid auth-grid">
    <div><h2>تسجيل الدخول</h2><input id="loginEmail" type="email" placeholder="البريد الإلكتروني"><input id="loginPassword" type="password" placeholder="كلمة المرور"><button id="loginBtn">دخول</button></div>
    <div><h2>حساب جديد</h2><input id="signupName" placeholder="اسم اللاعب"><input id="signupEmail" type="email" placeholder="البريد الإلكتروني"><input id="signupPassword" type="password" placeholder="كلمة المرور"><button id="signupBtn">إنشاء الحساب</button></div>
    <div id="authStatus" class="status">أدخل بياناتك للبدء.</div>
  </section>

  <section id="lobbyView" class="panel hidden">
    <div class="topbar"><div>مرحبًا <strong id="userName" class="user"></strong></div><button id="logoutBtn" class="danger">تسجيل الخروج</button></div>
    <div class="grid auth-grid">
      <div><h2>إنشاء غرفة</h2><p class="small">سيتم إنشاء رمز من 6 خانات ومقعدك سيكون الأبيض.</p><button id="createRoomBtn">إنشاء غرفة جديدة</button></div>
      <div><h2>الانضمام لغرفة</h2><input id="joinCode" maxlength="6" placeholder="رمز الغرفة"><button id="joinRoomBtn">انضمام</button></div>
    </div>
    <div id="lobbyStatus" class="status">جاهز.</div>
  </section>

  <section id="gameView" class="hidden grid game-grid">
    <div class="panel"><div id="board" class="board"></div></div>
    <aside class="panel">
      <h2>الغرفة</h2><div id="roomCode" class="room-code">------</div>
      <div id="players" class="players"></div>
      <div id="turnStatus" class="status">في انتظار اللاعبين…</div>
      <button id="startBtn" class="hidden">بدء المباراة</button>
      <button id="leaveBtn" class="secondary">العودة للرئيسية</button>
      <p class="small">اختر القطعة ثم المربع المطلوب. النقلات القانونية فقط مسموحة.</p>
    </aside>
  </section>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
<script src="auth-fix.js"></script>
</body>
</html>
