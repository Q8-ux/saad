name: Deploy Shatranj Game

on:
  push:
    branches: [main]
    paths:
      - 'shatranj-game/**'
      - '.github/workflows/install-shatranj-game.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload game
        uses: actions/upload-pages-artifact@v3
        with:
          path: shatranj-game

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
