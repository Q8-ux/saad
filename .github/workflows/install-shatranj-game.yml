name: Install Shatranj Game

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/install-shatranj-game.yml'

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decode project payload
        shell: bash
        run: |
          mkdir -p shatranj-game
          cat > /tmp/shatranj.b64 <<'PAYLOAD'

PAYLOAD
          base64 -d /tmp/shatranj.b64 > /tmp/shatranj.zip
          unzip -o /tmp/shatranj.zip -d shatranj-game
      - name: Commit installed game
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add shatranj-game
          git diff --cached --quiet || git commit -m "Install Shatranj game with Supabase integration"
          git push